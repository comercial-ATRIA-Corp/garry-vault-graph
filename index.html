    let network;
    let physicsEnabled = true;
    let searchMode = 'semantic';
    let embedder = null;
    let isLoading = false;

    // Cosine similarity
    function cosineSimilarity(a, b) {
      let dot = 0, normA = 0, normB = 0;
      for (let i = 0; i < a.length; i++) {
        dot += a[i] * b[i];
        normA += a[i] * a[i];
        normB += b[i] * b[i];
      }
      return dot / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    async function initEmbedder() {
      if (embedder) return;
      const resultsEl = document.getElementById('searchResults');
      resultsEl.innerHTML = '<div class="loading">🔄 Carregando modelo de embeddings...</div>';
      try {
        const pipeline = await window.transformersPipeline;
        embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        resultsEl.innerHTML = '<div class="loading" style="color:#81c784">✅ Modelo pronto! Digite sua busca.</div>';
      } catch (e) {
        resultsEl.innerHTML = '<div class="loading" style="color:#e57373">⚠️ Erro ao carregar modelo. Usando busca por keywords.</div>';
        searchMode = 'keyword';
        updateModeButtons();
      }
    }

    function setMode(mode) {
      searchMode = mode;
      updateModeButtons();
    }

    function updateModeButtons() {
      document.getElementById('modeSemantic').classList.toggle('active', searchMode === 'semantic');
      document.getElementById('modeKeyword').classList.toggle('active', searchMode === 'keyword');
    }

    async function getQueryEmbedding(text) {
      if (!embedder) await initEmbedder();
      if (!embedder) return null;
      const output = await embedder(text, { pooling: 'mean', normalize: true });
      return Array.from(output.data);
    }

    async function searchGraph() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.textContent = '🔄 Processando...';

      const resultsEl = document.getElementById('searchResults');
      resultsEl.innerHTML = '<div class="loading">🔄 Analisando...</div>';

      let results = [];

      if (searchMode === 'semantic' && embedder) {
        const queryEmb = await getQueryEmbedding(query);
        if (queryEmb) {
          graphData.nodes.forEach(node => {
            const sim = cosineSimilarity(queryEmb, node.embedding);
            if (sim > 0.3) {
              results.push({ node, score: sim });
            }
          });
        }
      }

      // Fallback to keyword if semantic fails or no results
      if (results.length === 0) {
        const queryLower = query.toLowerCase();
        graphData.nodes.forEach(node => {
          let score = 0;
          const labelLower = node.label.toLowerCase();
          const idLower = node.id.toLowerCase();
          
          if (labelLower === queryLower || idLower === queryLower) {
            score = 1.0;
          } else if (labelLower.includes(queryLower) || idLower.includes(queryLower)) {
            score = 0.8;
          } else {
            const queryWords = queryLower.split(/\s+/);
            const labelWords = labelLower.split(/[-_\s/]+/);
            const matches = queryWords.filter(w => labelWords.some(lw => lw.includes(w) || w.includes(lw))).length;
            score = matches / queryWords.length * 0.5;
          }
          
          if (score > 0) {
            results.push({ node, score });
          }
        });
      }

      results.sort((a, b) => b.score - a.score);
      
      resultsEl.innerHTML = '';
      
      if (results.length === 0) {
        resultsEl.innerHTML = '<div style="color:#888; padding:10px;">Nenhum resultado encontrado</div>';
        btn.disabled = false;
        btn.textContent = '🔍 Buscar';
        return;
      }

      results.slice(0, 8).forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `<span>${r.node.label}</span><span class="result-score">${(r.score * 100).toFixed(1)}%</span>`;
        div.onclick = () => {
          network.focus(r.node.id, { scale: 1.5, animation: true });
          network.selectNodes([r.node.id]);
        };
        resultsEl.appendChild(div);
      });

      if (results.length > 0) {
        network.focus(results[0].node.id, { scale: 1.5, animation: true });
        network.selectNodes([results[0].node.id]);
      }

      btn.disabled = false;
      btn.textContent = '🔍 Buscar';
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResults').innerHTML = '';
      network.fit({ animation: true });
      network.unselectAll();
    }

    function initGraph() {
      const groupColors = {
        root: '#4fc3f7',
        sources: '#81c784',
        entities: '#ffb74d',
        syntheses: '#e57373',
        concepts: '#ba68c8',
        reports: '#64b5f6'
      };

      const nodes = new vis.DataSet(
        graphData.nodes.map(n => ({
          ...n,
          color: {
            background: groupColors[n.group] || '#90a4ae',
            border: groupColors[n.group] || '#90a4ae',
            highlight: { background: '#fff', border: groupColors[n.group] || '#90a4ae' }
          },
          font: { color: '#eee', size: 14 },
          shape: 'dot',
          size: n.group === 'root' ? 25 : 18,
          borderWidth: 2,
          borderWidthSelected: 4,
          shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 10, x: 5, y: 5 }
        }))
      );

      const edges = new vis.DataSet(
        graphData.edges.map(e => ({
          ...e,
          color: { color: 'rgba(100,100,150,0.4)', highlight: '#4fc3f7' },
          width: 1.5,
          smooth: { type: 'continuous' },
          arrows: { to: { enabled: true, scaleFactor: 0.5 } }
        }))
      );

      const container = document.getElementById('network');
      const data = { nodes, edges };
      const options = {
        physics: {
          enabled: true,
          barnesHut: {
            gravitationalConstant: -3000,
            centralGravity: 0.3,
            springLength: 120,
            springConstant: 0.04,
            damping: 0.09
          },
          stabilization: { iterations: 200 }
        },
        interaction: {
          hover: true,
          tooltipDelay: 200,
          zoomView: true,
          dragView: true
        }
      };

      network = new vis.Network(container, data, options);

      // Legend
      const legendEl = document.getElementById('legend');
      Object.entries(groupColors).forEach(([group, color]) => {
        legendEl.innerHTML += `
          <div class="legend-item">
            <div class="legend-dot" style="background:${color}"></div>
            <span>${group}</span>
          </div>`;
      });

      // Stats
      document.getElementById('nodeCount').textContent = nodes.length;
      document.getElementById('edgeCount').textContent = edges.length;

      // Tooltip
      const tooltip = document.getElementById('tooltip');
      network.on('hoverNode', function(params) {
        const node = nodes.get(params.node);
        tooltip.style.display = 'block';
        tooltip.innerHTML = `<strong>${node.label}</strong><br><small>${node.group}</small>`;
      });
      network.on('blurNode', function() { tooltip.style.display = 'none'; });
      network.on('afterDrawing', function() {
        if (tooltip.style.display === 'block') {
          const pos = network.getPositions([network.getSelectedNodes()[0]]);
          if (pos) {
            const domPos = network.canvasToDOM(pos[network.getSelectedNodes()[0]]);
            tooltip.style.left = domPos.x + 20 + 'px';
            tooltip.style.top = domPos.y - 20 + 'px';
          }
        }
      });

      // Pre-load embedder in background
      initEmbedder();
    }

    function fitGraph() {
      network.fit({ animation: true });
    }

    function togglePhysics() {
      physicsEnabled = !physicsEnabled;
      network.setOptions({ physics: { enabled: physicsEnabled } });
      document.querySelector('.controls button:nth-child(2)').textContent = physicsEnabled ? 'Física: ON' : 'Física: OFF';
    }

    function exportImage() {
      const canvas = document.querySelector('#network canvas');
      const link = document.createElement('a');
      link.download = 'garryvault-graph.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    window.onload = initGraph;
  </script>
