<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarryVault - Grafo de Conhecimento</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    overflow: hidden;
  }
  #container {
    display: flex;
    height: 100vh;
  }
  #sidebar {
    width: 320px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    padding: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #graph {
    flex: 1;
    position: relative;
    background: #1a1a2e;
  }
  h1 {
    font-size: 1.3rem;
    margin-bottom: 4px;
    color: #e94560;
  }
  .subtitle {
    font-size: 0.8rem;
    color: #8892b0;
    margin-bottom: 16px;
  }
  .search-box {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #0f3460;
    border-radius: 8px;
    background: #1a1a2e;
    color: #eee;
    font-size: 0.95rem;
    margin-bottom: 12px;
    outline: none;
  }
  .search-box:focus {
    border-color: #e94560;
  }
  .results {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 16px;
    border-radius: 8px;
    background: #1a1a2e;
    border: 1px solid #0f3460;
  }
  .result-item {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid #0f3460;
    font-size: 0.85rem;
  }
  .result-item:hover {
    background: #0f3460;
  }
  .result-item:last-child {
    border-bottom: none;
  }
  .result-sim {
    float: right;
    color: #e94560;
    font-weight: bold;
  }
  .legend {
    margin-bottom: 16px;
  }
  .legend h3 {
    font-size: 0.9rem;
    margin-bottom: 8px;
    color: #ccd6f6;
  }
  .legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    font-size: 0.85rem;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    margin-bottom: 8px;
    width: 100%;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-export {
    background: #e94560;
    color: white;
  }
  .btn-reset {
    background: #0f3460;
    color: #eee;
  }
  .stats {
    font-size: 0.8rem;
    color: #8892b0;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid #0f3460;
  }
  .node-info {
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    display: none;
  }
  .node-info h4 {
    color: #e94560;
    margin-bottom: 6px;
  }
  .node-info p {
    color: #ccd6f6;
    line-height: 1.4;
  }
  .preview {
    color: #8892b0;
    font-style: italic;
    margin-top: 8px;
    font-size: 0.8rem;
  }
  #network {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="container">
  <div id="sidebar">
    <h1>🧠 GarryVault</h1>
    <div class="subtitle">Grafo Semântico de Conhecimento</div>

    <input type="text" id="searchInput" class="search-box" placeholder="Busca semântica...">
    <div id="searchResults" class="results"></div>

    <div class="node-info" id="nodeInfo">
      <h4 id="nodeTitle"></h4>
      <p id="nodePath"></p>
      <p class="preview" id="nodePreview"></p>
    </div>

    <div class="legend">
      <h3>Tipos de Nós</h3>
      <div id="legendContainer"></div>
    </div>

    <div class="legend">
      <h3>Tipos de Conexão</h3>
      <div class="legend-item">
        <span style="display:inline-block;width:20px;height:2px;background:#95a5a6;margin-right:8px;"></span>
        <span>Wikilink</span>
      </div>
      <div class="legend-item">
        <span style="display:inline-block;width:20px;height:2px;background:#3498db;border-top:1px dashed #3498db;margin-right:8px;"></span>
        <span>Semântica (similaridade)</span>
      </div>
    </div>

    <button class="btn btn-reset" onclick="resetView()">Resetar Visualização</button>
    <button class="btn btn-export" onclick="exportPNG()">Exportar PNG</button>

    <div class="stats" id="stats"></div>
  </div>
  <div id="graph">
    <div id="network"></div>
  </div>
</div>

      na += a[i] * a[i];

    const scores = searchIndex.map(item => {
      let score = 0;
      const qWords = query.split(/\s+/).filter(w => w.length > 2);

      // Label match
      if (item.label.toLowerCase().includes(query)) score += 5;

      // Content word matches
      qWords.forEach(w => {

        score += matches * 0.5;
      });

      return { id: item.id, label: item.label, score: score };
